<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Blur Gesture Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        video { 
            transform: scaleX(-1); 
        }
        /* Efek transisi dipercepat jadi 0.2 detik biar responsif banget */
        .kotak-ngeblur {
            filter: blur(15px) !important;
            -webkit-filter: blur(15px) !important;
            transition: filter 0.2s ease-in-out;
        }
        .kotak-bening {
            filter: blur(0px) !important;
            -webkit-filter: blur(0px) !important;
            transition: filter 0.2s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen p-4">

    <h1 class="text-3xl font-bold mb-4">🎵 Hand Gesture Music Controller</h1>
    
    <div id="videoContainer" class="relative w-full max-w-md bg-black rounded-lg overflow-hidden shadow-lg border border-gray-700 kotak-ngeblur">
        <video id="webcam" class="w-full h-auto object-cover" autoplay playsinline></video>
        <div id="status" class="absolute top-4 left-4 text-yellow-400 font-bold text-2xl drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]">
            Music : PAUSED
        </div>
    </div>

    <audio id="bgMusic" src="music.mp3" loop></audio>

    <div class="mt-6 text-center text-gray-400 max-w-sm">
        <p class="font-semibold text-white mb-2">💡 Cara Kontrol:</p>
        <p>✋ Buka Tangan = <span class="text-green-400 font-bold">PLAY + Kamera BENING</span></p>
        <p>✊ Kepal Tangan = <span class="text-yellow-400 font-bold">PAUSE + Kamera NGEBLUR</span></p>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const videoContainer = document.getElementById('videoContainer');
        const statusElement = document.getElementById('status');
        const music = document.getElementById('bgMusic');
        let musicPlaying = false;

        function checkGesture(landmarks) {
            // Kita cek 4 jari utama: Telunjuk(8), Tengah(12), Manis(16), Kelingking(20)
            const tipIds = [8, 12, 16, 20];
            let openFingers = 0;

            for (let i = 0; i < tipIds.length; i++) {
                if (landmarks[tipIds[i]].y < landmarks[tipIds[i] - 2].y) {
                    openFingers++;
                }
            }

            // --- KITA BIKIN TOLERANSI AGAR LEBIH SENSITIF ---
            
            if (openFingers >= 3) { 
                // Jika minimal ada 3 jari tegak -> BUKA TANGAN (BENING)
                if (!musicPlaying) {
                    music.play().then(() => {
                        musicPlaying = true;
                    }).catch(e => console.log(e));
                }
                statusElement.innerText = "Music : PLAYING";
                statusElement.className = "absolute top-4 left-4 text-green-400 font-bold text-2xl drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]";
                
                videoContainer.className = "relative w-full max-w-md bg-black rounded-lg overflow-hidden shadow-lg border border-gray-700 kotak-bening";

            } else if (openFingers <= 1) { 
                // Jika jari rapat/mengepal (0 atau 1 jari) -> KEPAL TANGAN (NGEBLUR)
                if (musicPlaying) {
                    music.pause();
                    musicPlaying = false;
                }
                statusElement.innerText = "Music : PAUSED";
                statusElement.className = "absolute top-4 left-4 text-yellow-400 font-bold text-2xl drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]";
                
                videoContainer.className = "relative w-full max-w-md bg-black rounded-lg overflow-hidden shadow-lg border border-gray-700 kotak-ngeblur";
            }
        }

        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                checkGesture(results.multiHandLandmarks[0]);
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5, // Diturunkan sedikit biar makin peka di tempat redup
            minTrackingConfidence: 0.5
        });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        camera.start();

        window.addEventListener('click', () => {
            if(!musicPlaying && statusElement.innerText === "Music : PLAYING") {
                music.play();
            }
        });
    </script>
</body>
</html>
