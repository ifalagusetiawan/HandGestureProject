<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Gesture Blur Only</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #webcam { 
            transform: scaleX(-1); 
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }
        .layar-ngeblur {
            filter: blur(25px) !important;
            -webkit-filter: blur(25px) !important;
            transition: filter 0.2s ease-in-out;
        }
        .layar-bening {
            filter: none !important;
            -webkit-filter: none !important;
            transition: filter 0.2s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-900 text-white overflow-hidden font-sans min-h-screen relative flex flex-col items-center justify-between p-8">

    <video id="webcam" class="layar-bening" autoplay playsinline></video>

    <div class="z-10 text-center mt-4">
        <h1 class="text-3xl md:text-4xl font-extrabold tracking-wide drop-shadow-[0_4px_6px_rgba(0,0,0,0.8)] mb-3">
            🎵 Hand Gesture Music Controller
        </h1>
        <div id="status" class="inline-block bg-black/50 backdrop-blur-md px-6 py-2 rounded-full text-green-400 font-black text-2xl tracking-wider border border-green-500/30 shadow-lg drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">
            Music : ACTIVE
        </div>
    </div>

    <audio id="bgMusic" src="music.mp3" loop></audio>

    <div class="z-10 bg-black/60 backdrop-blur-md px-6 py-4 rounded-2xl border border-gray-700/50 shadow-2xl max-w-sm w-full text-center mb-4">
        <p class="font-bold text-gray-200 mb-2 tracking-wide">💡 EFFECT KONTROL</p>
        <div class="space-y-1 text-sm md:text-base text-gray-300">
            <p>✋ Buka Tangan / Kosong = <span class="text-green-400 font-bold">Layar BENING</span></p>
            <p>✊ Kepal Tangan = <span class="text-yellow-400 font-bold">Layar NGEBLUR TOTAL</span></p>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const statusElement = document.getElementById('status');
        const music = document.getElementById('bgMusic');
        let musicStarted = false;

        function updateTampilan(isBlur) {
            if (isBlur) {
                videoElement.className = "layar-ngeblur";
            } else {
                videoElement.className = "layar-bening";
            }
        }

        function onResults(results) {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                updateTampilan(false);
                return;
            }

            const landmarks = results.multiHandLandmarks[0];
            const tipIds = [8, 12, 16, 20];
            let openFingers = 0;

            for (let i = 0; i < tipIds.length; i++) {
                if (landmarks[tipIds[i]].y < landmarks[tipIds[i] - 2].y) {
                    openFingers++;
                }
            }

            if (openFingers <= 1) {
                updateTampilan(true);
            } else {
                updateTampilan(false);
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.4,
            minTrackingConfidence: 0.4
        });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 1280,
            height: 720
        });
        camera.start();

        window.addEventListener('click', () => {
            if (!musicStarted) {
                music.play().then(() => {
                    musicStarted = true;
                }).catch(e => console.log(e));
            }
        });
    </script>
</body>
</html>
